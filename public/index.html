<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zalo Like - Thực Chiến</title>
    <script src="https://cdn.jsdelivr.net/npm/stream-chat"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .zalo-blue { background-color: #0068ff; }
        ::-webkit-scrollbar { width: 0; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center font-sans overflow-hidden">

    <div id="login-screen" class="hidden w-full max-w-sm bg-white p-8 rounded-[40px] shadow-2xl text-center">
        <h1 class="text-[#0068ff] text-5xl font-black italic mb-2 tracking-tighter">Zalo</h1>
        <p class="text-gray-400 text-xs font-bold mb-8 uppercase tracking-widest">Like Edition</p>
        <div class="space-y-4">
            <input id="user" type="text" placeholder="Tên đăng nhập" class="w-full border-b-2 p-3 outline-none focus:border-blue-500 font-bold text-center">
            <input id="pass" type="password" placeholder="Mật khẩu" class="w-full border-b-2 p-3 outline-none focus:border-blue-500 font-bold text-center">
            <button onclick="auth()" id="lbtn" class="w-full zalo-blue text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ĐĂNG NHẬP / ĐĂNG KÝ</button>
        </div>
    </div>

    <div id="app-screen" class="hidden w-full h-screen max-w-md bg-white flex flex-col relative shadow-2xl">
        <header class="zalo-blue p-4 text-white flex items-center space-x-3">
            <div onclick="openProfile(currentUser)" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold cursor-pointer" id="my-ava">?</div>
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-white/50 text-xs"></i>
                <input id="search" oninput="searchUsers()" placeholder="Tìm bạn bè..." class="w-full bg-white/10 rounded-full py-2 pl-9 pr-4 text-xs outline-none placeholder:text-white/50">
                <div id="search-res" class="hidden absolute top-11 left-0 w-full bg-white shadow-2xl rounded-xl text-black z-50 divide-y"></div>
            </div>
            <button onclick="logout()"><i class="fa-solid fa-power-off text-sm"></i></button>
        </header>

        <div id="main-content" class="flex-1 overflow-y-auto">
            <div id="inbox-view" class="divide-y divide-gray-50"></div>
            <div id="contact-view" class="hidden p-4"><p class="text-center text-gray-400 text-xs mt-10 italic">Đang cập nhật danh bạ...</p></div>
        </div>

        <footer class="border-t flex justify-around p-3 bg-gray-50">
            <button onclick="switchTab('inbox')" class="flex flex-col items-center text-[#0068ff]"><i class="fa-regular fa-comment-dots text-xl"></i><span class="text-[9px] font-bold">Tin nhắn</span></button>
            <button onclick="switchTab('contact')" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-address-book text-xl"></i><span class="text-[9px] font-bold">Danh bạ</span></button>
        </footer>

        <div id="chat-win" class="hidden absolute inset-0 bg-white flex flex-col z-40 slide-up">
            <header class="zalo-blue p-4 text-white flex items-center shadow-md">
                <button onclick="closeChat()" class="mr-4"><i class="fa-solid fa-chevron-left"></i></button>
                <div id="chat-title" class="font-bold flex-1 text-sm">...</div>
                <button onclick="openProfile(targetUser)" class="opacity-80"><i class="fa-solid fa-circle-user text-xl"></i></button>
            </header>
            <div id="msgs" class="flex-1 bg-[#ebeef2] overflow-y-auto p-4 space-y-4"></div>
            <div class="p-3 border-t flex items-center space-x-2 bg-white">
                <input id="minput" placeholder="Nhập tin nhắn..." class="flex-1 outline-none text-sm p-1">
                <button onclick="send()" class="text-[#0068ff] text-2xl px-2"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="p-modal" class="hidden fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-8">
        <div class="bg-white rounded-[32px] w-full max-w-xs p-6 text-center shadow-2xl">
            <div id="p-img" class="w-24 h-24 mx-auto rounded-full mb-4 border-4 border-blue-50 bg-gray-100 flex items-center justify-center font-bold text-3xl text-blue-600">?</div>
            <h2 id="p-id" class="text-xl font-bold text-slate-800">...</h2>
            <p class="text-[10px] text-gray-400 mb-6 uppercase font-bold tracking-widest">Người dùng Zalo Like</p>
            <div class="space-y-2">
                <button id="p-action" class="w-full zalo-blue text-white py-3 rounded-xl font-bold shadow-lg">NHẮN TIN</button>
                <button onclick="document.getElementById('p-modal').classList.add('hidden')" class="w-full bg-gray-100 text-gray-500 py-3 rounded-xl font-bold">ĐÓNG</button>
            </div>
        </div>
    </div>

    <script>
        let client, activeChan, currentUser, targetUser;

        async function auth() {
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value.trim();
            const btn = document.getElementById('lbtn');
            btn.innerText = "ĐANG XỬ LÝ...";
            
            try {
                const res = await fetch('/v2/portal-toc', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                }).then(r => r.json());
                
                if(res.error) return alert(res.error);
                localStorage.setItem('zalo_sess', JSON.stringify({ ...res, time: Date.now() }));
                initApp(res);
            } catch(e) { alert("Lỗi Portal! Sếp kiểm tra Render."); }
            finally { btn.innerText = "ĐĂNG NHẬP / ĐĂNG KÝ"; }
        }

        async function initApp(data) {
            currentUser = data.username;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('my-ava').innerText = currentUser[0].toUpperCase();

            client = StreamChat.getInstance('bkzgy39gxa2u');
            await client.connectUser({ id: currentUser, name: currentUser }, data.token);
            
            loadInbox();
            client.on(e => (e.type === 'message.new') && loadInbox());
        }

        async function searchUsers() {
            const q = document.getElementById('search').value.trim();
            const resBox = document.getElementById('search-res');
            if(q.length < 1) return resBox.classList.add('hidden');
            
            const { users } = await client.queryUsers({ id: { $autocomplete: q }, id: { $ne: currentUser } });
            resBox.innerHTML = users.map(u => `
                <div onclick="openProfile('${u.id}')" class="p-4 flex items-center space-x-3 active:bg-gray-100 cursor-pointer">
                    <div class="w-8 h-8 zalo-blue rounded-full text-white flex items-center justify-center font-bold text-xs uppercase">${u.id[0]}</div>
                    <div class="text-sm font-bold text-slate-700">${u.id}</div>
                </div>
            `).join('');
            resBox.classList.remove('hidden');
        }

        async function openProfile(uid) {
            targetUser = uid;
            document.getElementById('search-res').classList.add('hidden');
            document.getElementById('p-id').innerText = uid;
            document.getElementById('p-img').innerText = uid[0].toUpperCase();
            
            const cid = [currentUser, uid].sort().join('-');
            const btn = document.getElementById('p-action');
            
            btn.onclick = async () => {
                const chan = client.channel('messaging', cid, { members: [currentUser, uid] });
                await chan.watch();
                document.getElementById('p-modal').classList.add('hidden');
                openChat(cid);
            };
            
            document.getElementById('p-modal').classList.remove('hidden');
        }

        async function loadInbox() {
            const chans = await client.queryChannels({ members: { $in: [currentUser] } }, { last_message_at: -1 });
            document.getElementById('inbox-view').innerHTML = chans.map(c => {
                const other = Object.keys(c.state.members).find(m => m !== currentUser) || "Sảnh";
                return `
                    <div onclick="openChat('${c.id}')" class="p-4 flex items-center space-x-4 bg-white active:bg-gray-50 border-b border-gray-50 transition-all">
                        <div class="w-14 h-14 bg-blue-100 text-[#0068ff] rounded-2xl flex items-center justify-center font-black text-xl uppercase border border-blue-200">${other[0]}</div>
                        <div class="flex-1 overflow-hidden">
                            <div class="font-bold text-sm text-slate-800">${other}</div>
                            <div class="text-[11px] text-gray-400 truncate">${c.state.messages.slice(-1)[0]?.text || 'Nhấn để bắt đầu chat...'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openChat(cid) {
            activeChan = client.channel('messaging', cid);
            await activeChan.watch();
            targetUser = Object.keys(activeChan.state.members).find(m => m !== currentUser);
            document.getElementById('chat-title').innerText = targetUser || "SẢNH CHUNG";
            document.getElementById('chat-win').classList.remove('hidden');
            renderMsgs(activeChan.state.messages);
            activeChan.on('message.new', e => renderMsgs([e.message], true));
        }

        function renderMsgs(msgs, append=false) {
            const container = document.getElementById('msgs');
            const html = msgs.map(m => {
                const isMe = m.user.id === currentUser;
                return `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                    <div class="${isMe ? 'bg-[#e1f0ff] rounded-2xl rounded-tr-none border border-blue-200' : 'bg-white rounded-2xl rounded-tl-none'} p-3 shadow-sm text-sm max-w-[85%] break-words">
                        ${m.text}
                    </div>
                </div>`;
            }).join('');
            if(append) container.innerHTML += html; else container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('minput');
            if(!i.value.trim()) return;
            await activeChan.sendMessage({ text: i.value });
            i.value = '';
        }

        function closeChat() { document.getElementById('chat-win').classList.add('hidden'); loadInbox(); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const s = localStorage.getItem('zalo_sess');
            if(s) {
                const d = JSON.parse(s);
                if(Date.now() - d.time > 3600000) return logout();
                initApp(d);
            } else { document.getElementById('login-screen').classList.remove('hidden'); }
        };
    </script>
</body>
</html>
